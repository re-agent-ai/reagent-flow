name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Lint
        run: uv run ruff check packages/ examples/

      - name: Format check
        run: uv run ruff format --check packages/ examples/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Type check
        run: |
          uv run mypy packages/reagent-flow/src/reagent_flow/ --strict
          uv run mypy packages/reagent-flow-openai/src/reagent_flow_openai/ --strict
          uv run mypy packages/reagent-flow-anthropic/src/reagent_flow_anthropic/ --strict
          uv run mypy packages/reagent-flow-langchain/src/reagent_flow_langchain/ --strict
          uv run mypy packages/reagent-flow-langgraph/src/reagent_flow_langgraph/ --strict
          uv run mypy packages/reagent-flow-crewai/src/reagent_flow_crewai/ --strict

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Test with coverage
        run: |
          uv run coverage run -m pytest packages/ -v
          uv run coverage report

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Build packages
        run: |
          (cd packages/reagent-flow && uv build)
          (cd packages/reagent-flow-openai && uv build)
          (cd packages/reagent-flow-anthropic && uv build)
          (cd packages/reagent-flow-langchain && uv build)
          (cd packages/reagent-flow-langgraph && uv build)
          (cd packages/reagent-flow-crewai && uv build)
