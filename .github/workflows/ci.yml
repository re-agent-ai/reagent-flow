name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e packages/ttrace-ai
          pip install pytest ruff mypy

      - name: Lint
        run: ruff check packages/

      - name: Type check
        run: mypy packages/ttrace-ai/src/ttrace_ai/ --strict

      - name: Install adapters
        run: |
          pip install -e packages/ttrace-ai-openai
          pip install -e packages/ttrace-ai-langchain
          pip install -e packages/ttrace-ai-langgraph
          pip install -e packages/ttrace-ai-crewai

      - name: Test core
        run: pytest packages/ttrace-ai/tests/ -v

      - name: Test adapters
        run: |
          pytest packages/ttrace-ai-openai/tests/ -v
          pytest packages/ttrace-ai-langchain/tests/ -v
          pytest packages/ttrace-ai-langgraph/tests/ -v
          pytest packages/ttrace-ai-crewai/tests/ -v

      - name: Test examples
        run: pytest examples/ -v
