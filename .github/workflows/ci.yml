name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install ruff

      - name: Lint
        run: ruff check packages/ examples/

      - name: Format check
        run: ruff format --check packages/ examples/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e packages/reagent-ai
          pip install -e packages/reagent-ai-openai
          pip install -e packages/reagent-ai-anthropic
          pip install -e packages/reagent-ai-langchain
          pip install -e packages/reagent-ai-langgraph
          pip install -e packages/reagent-ai-crewai
          pip install mypy

      - name: Type check
        run: |
          mypy packages/reagent-ai/src/reagent_ai/ --strict
          mypy packages/reagent-ai-openai/src/reagent_ai_openai/ --strict
          mypy packages/reagent-ai-anthropic/src/reagent_ai_anthropic/ --strict
          mypy packages/reagent-ai-langchain/src/reagent_ai_langchain/ --strict
          mypy packages/reagent-ai-langgraph/src/reagent_ai_langgraph/ --strict
          mypy packages/reagent-ai-crewai/src/reagent_ai_crewai/ --strict

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e "packages/reagent-ai[dev]"
          pip install -e packages/reagent-ai-openai
          pip install -e packages/reagent-ai-anthropic
          pip install -e packages/reagent-ai-langchain
          pip install -e packages/reagent-ai-langgraph
          pip install -e packages/reagent-ai-crewai

      - name: Test with coverage
        run: |
          coverage run -m pytest packages/ examples/ -v
          coverage report

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install hatch
        run: pip install hatch

      - name: Build packages
        run: |
          (cd packages/reagent-ai && hatch build)
          (cd packages/reagent-ai-openai && hatch build)
          (cd packages/reagent-ai-anthropic && hatch build)
          (cd packages/reagent-ai-langchain && hatch build)
          (cd packages/reagent-ai-langgraph && hatch build)
          (cd packages/reagent-ai-crewai && hatch build)
