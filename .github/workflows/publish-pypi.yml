name: Publish to PyPI

on:
  release:
    types: [published]

concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  build:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra demo

      - name: Build distributions
        run: |
          rm -rf dist
          mkdir -p dist
          for pkg in \
            packages/reagent-flow \
            packages/reagent-flow-openai \
            packages/reagent-flow-anthropic \
            packages/reagent-flow-langchain \
            packages/reagent-flow-langgraph \
            packages/reagent-flow-crewai
          do
            (cd "$pkg" && uv build)
            cp "$pkg"/dist/* dist/
          done

      - name: Check distributions
        run: uv run --with twine python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
