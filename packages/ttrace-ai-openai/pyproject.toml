[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ttrace-ai-openai"
version = "0.1.0"
description = "TTrace-AI adapter for OpenAI Python SDK"
requires-python = ">=3.10"
license = "MIT"
dependencies = ["ttrace-ai>=0.1.0", "openai>=1.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/ttrace_ai_openai"]
