[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reagent-ai"
version = "0.1.0"
description = "Behavioral testing library for AI agent tool-calling loops"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = ["ai", "agents", "testing", "llm", "tools"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov>=4.0", "pytest-asyncio>=0.21", "mypy>=1.0", "ruff>=0.1"]

[project.entry-points.pytest11]
reagent_ai = "reagent_ai.pytest_plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/reagent_ai"]
