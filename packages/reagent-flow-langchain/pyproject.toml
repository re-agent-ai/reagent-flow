[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reagent-flow-langchain"
version = "0.1.0"
description = "Reagent-Flow adapter for LangChain"
requires-python = ">=3.10"
license = "MIT"
dependencies = ["reagent-flow>=0.1.0"]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/reagent_flow_langchain"]
