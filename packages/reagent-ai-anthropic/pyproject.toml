[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reagent-ai-anthropic"
version = "0.1.0"
description = "Reagent-AI adapter for Anthropic Python SDK"
requires-python = ">=3.10"
license = "MIT"
dependencies = ["reagent-ai>=0.1.0", "anthropic>=0.20"]

[tool.hatch.build.targets.wheel]
packages = ["src/reagent_ai_anthropic"]
