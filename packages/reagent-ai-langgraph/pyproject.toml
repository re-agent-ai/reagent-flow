[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reagent-ai-langgraph"
version = "0.1.0"
description = "Reagent-AI adapter for LangGraph"
requires-python = ">=3.10"
license = "MIT"
dependencies = ["reagent-ai>=0.1.0", "reagent-ai-langchain>=0.1.0"]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/reagent_ai_langgraph"]
