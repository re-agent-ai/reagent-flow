[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reagent-flow-openai"
version = "0.1.0"
description = "Reagent-Flow adapter for OpenAI Python SDK"
requires-python = ">=3.10"
license = "MIT"
dependencies = ["reagent-flow>=0.1.0", "openai>=1.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/reagent_flow_openai"]
