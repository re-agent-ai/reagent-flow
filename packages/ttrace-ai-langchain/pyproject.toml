[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ttrace-ai-langchain"
version = "0.1.0"
description = "TTrace-AI adapter for LangChain"
requires-python = ">=3.10"
license = "MIT"
dependencies = ["ttrace-ai>=0.1.0"]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/ttrace_ai_langchain"]
