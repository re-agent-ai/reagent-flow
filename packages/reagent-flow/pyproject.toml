[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "reagent-flow"
version = "0.4.0"
description = "Behavioral testing library for AI agent tool-calling loops"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
keywords = ["ai", "agents", "testing", "llm", "tools"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Testing",
]

[project.urls]
Homepage = "https://github.com/re-agent-ai/reagent-flow"
Repository = "https://github.com/re-agent-ai/reagent-flow"
Issues = "https://github.com/re-agent-ai/reagent-flow/issues"

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov>=4.0", "pytest-asyncio>=1.3.0", "mypy>=1.0", "ruff>=0.1"]

[project.entry-points.pytest11]
reagent_flow = "reagent_flow.pytest_plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/reagent_flow"]
