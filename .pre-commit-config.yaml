repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'uv run mypy packages/reagent-flow/src/reagent_flow/ packages/reagent-flow-openai/src/reagent_flow_openai/ packages/reagent-flow-anthropic/src/reagent_flow_anthropic/ packages/reagent-flow-langchain/src/reagent_flow_langchain/ packages/reagent-flow-langgraph/src/reagent_flow_langgraph/ packages/reagent-flow-crewai/src/reagent_flow_crewai/ --strict'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        entry: uv run pytest packages/ -x -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
