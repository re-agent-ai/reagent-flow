repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'mypy packages/reagent-ai/src/reagent_ai/ packages/reagent-ai-openai/src/reagent_ai_openai/ packages/reagent-ai-anthropic/src/reagent_ai_anthropic/ packages/reagent-ai-langchain/src/reagent_ai_langchain/ packages/reagent-ai-langgraph/src/reagent_ai_langgraph/ packages/reagent-ai-crewai/src/reagent_ai_crewai/ --strict'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        entry: python -m pytest packages/ examples/ -x -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
